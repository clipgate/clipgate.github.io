<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">I accidentally pasted a password or API key — what to do next</title>
  <desc id="desc">Editorial illustration showing a leaked credential, a triage checklist, and a secret-aware clipboard recovery flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#09111d"/>
      <stop offset="100%" stop-color="#121826"/>
    </linearGradient>
    <linearGradient id="alert" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(248,113,113,0.18)"/>
      <stop offset="100%" stop-color="rgba(245,158,11,0.10)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" rx="32" fill="url(#bg)"/>
  <g stroke="rgba(0,212,255,0.08)" stroke-width="1">
    <path d="M0 90H1200M0 180H1200M0 270H1200M0 360H1200M0 450H1200M0 540H1200M0 630H1200"/>
    <path d="M120 0V720M240 0V720M360 0V720M480 0V720M600 0V720M720 0V720M840 0V720M960 0V720M1080 0V720"/>
  </g>
  <g transform="translate(62 60)">
    <rect x="0" y="0" width="1076" height="600" rx="28" fill="rgba(15,23,42,0.82)" stroke="rgba(0,212,255,0.18)"/>
    <text x="44" y="58" fill="#f87171" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">⚠ Incident Playbook</text>
    <text x="44" y="118" fill="#e6edf3" font-size="42" font-family="Inter, Arial, sans-serif" font-weight="800">I just pasted a password</text>
    <text x="44" y="166" fill="#e6edf3" font-size="42" font-family="Inter, Arial, sans-serif" font-weight="800">(or API key). Now what?</text>
    <text x="44" y="206" fill="#94a3b8" font-size="22" font-family="Inter, Arial, sans-serif">A calm, step-by-step recovery playbook — and how to stop it forever.</text>
    <g transform="translate(44 246)">
      <rect x="0" y="0" width="610" height="304" rx="20" fill="rgba(7,13,22,0.9)" stroke="rgba(248,113,113,0.30)"/>
      <text x="22" y="34" fill="#f87171" font-size="17" font-family="JetBrains Mono, monospace"># the 60-second triage</text>
      <text x="22" y="68" fill="#00d4ff" font-size="18" font-family="JetBrains Mono, monospace">$</text>
      <text x="42" y="68" fill="#e6edf3" font-size="18" font-family="JetBrains Mono, monospace">git push origin main</text>
      <text x="22" y="102" fill="#94a3b8" font-size="17" font-family="JetBrains Mono, monospace">remote: Push contains secret</text>
      <text x="22" y="124" fill="#94a3b8" font-size="17" font-family="JetBrains Mono, monospace">remote: → ghp_live_***</text>
      <line x1="22" y1="148" x2="566" y2="148" stroke="#3b1f25"/>
      <text x="22" y="180" fill="#34d399" font-size="17" font-family="JetBrains Mono, monospace">1. Rotate the credential — now</text>
      <text x="22" y="206" fill="#34d399" font-size="17" font-family="JetBrains Mono, monospace">2. Revoke the old token at the source</text>
      <text x="22" y="232" fill="#34d399" font-size="17" font-family="JetBrains Mono, monospace">3. Audit logs for any use you didn't make</text>
      <text x="22" y="258" fill="#34d399" font-size="17" font-family="JetBrains Mono, monospace">4. Clean the surface it leaked to</text>
      <text x="22" y="284" fill="#34d399" font-size="17" font-family="JetBrains Mono, monospace">5. Tell anyone who needs to know</text>
    </g>
    <g transform="translate(686 246)">
      <rect x="0" y="0" width="346" height="124" rx="18" fill="url(#alert)" stroke="rgba(248,113,113,0.30)"/>
      <text x="24" y="38" fill="#f87171" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">Where it usually leaks</text>
      <text x="24" y="68" fill="#e6edf3" font-size="16" font-family="Inter, Arial, sans-serif">Slack / Teams DMs</text>
      <text x="24" y="92" fill="#e6edf3" font-size="16" font-family="Inter, Arial, sans-serif">GitHub commits + issues</text>
      <text x="190" y="68" fill="#e6edf3" font-size="16" font-family="Inter, Arial, sans-serif">Screen-share window</text>
      <text x="190" y="92" fill="#e6edf3" font-size="16" font-family="Inter, Arial, sans-serif">Notion / Jira / docs</text>
      <rect x="0" y="150" width="346" height="204" rx="18" fill="rgba(0,212,255,0.05)" stroke="rgba(0,212,255,0.18)"/>
      <text x="24" y="186" fill="#00d4ff" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="800">Stop it forever</text>
      <text x="24" y="220" fill="#e6edf3" font-size="15" font-family="Inter, Arial, sans-serif">A clipboard that recognizes a token</text>
      <text x="24" y="240" fill="#e6edf3" font-size="15" font-family="Inter, Arial, sans-serif">and treats it differently from text.</text>
      <text x="24" y="276" fill="#94a3b8" font-size="15" font-family="Inter, Arial, sans-serif">Local. Encrypted. Auto-classified.</text>
      <text x="24" y="300" fill="#94a3b8" font-size="15" font-family="Inter, Arial, sans-serif">No cloud. No history of your secrets.</text>
      <text x="24" y="334" fill="#34d399" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="700">cg → secret-aware by default</text>
    </g>
  </g>
</svg>
