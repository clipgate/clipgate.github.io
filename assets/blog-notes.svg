<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">ClipGate blog notes</title>
  <desc id="desc">Editorial style illustration for the ClipGate blog.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="25%" r="70%">
      <stop offset="0%" stop-color="rgba(0,212,255,0.24)"/>
      <stop offset="100%" stop-color="rgba(0,212,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="700" rx="32" fill="url(#bg)"/>
  <rect width="1200" height="700" rx="32" fill="url(#glow)"/>
  <g stroke="rgba(0,212,255,0.09)" stroke-width="1">
    <path d="M0 100H1200M0 200H1200M0 300H1200M0 400H1200M0 500H1200M0 600H1200"/>
    <path d="M100 0V700M200 0V700M300 0V700M400 0V700M500 0V700M600 0V700M700 0V700M800 0V700M900 0V700M1000 0V700M1100 0V700"/>
  </g>
  <g transform="translate(70 72)">
    <rect x="0" y="0" width="1060" height="560" rx="24" fill="rgba(15,23,42,0.82)" stroke="rgba(0,212,255,0.18)"/>
    <text x="48" y="62" fill="#00d4ff" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">ClipGate Notes</text>
    <text x="48" y="126" fill="#e6edf3" font-size="50" font-family="Inter, Arial, sans-serif" font-weight="800">Practical notes for</text>
    <text x="48" y="184" fill="#e6edf3" font-size="50" font-family="Inter, Arial, sans-serif" font-weight="800">terminal-native developers</text>
    <text x="48" y="230" fill="#94a3b8" font-size="24" font-family="Inter, Arial, sans-serif">Workflow design, privacy thinking, install guidance, and release context.</text>
    <g transform="translate(48 280)">
      <rect x="0" y="0" width="190" height="42" rx="21" fill="rgba(0,212,255,0.12)" stroke="rgba(0,212,255,0.28)"/>
      <text x="24" y="27" fill="#00d4ff" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="700">Workflow</text>
      <rect x="208" y="0" width="162" height="42" rx="21" fill="rgba(52,211,153,0.12)" stroke="rgba(52,211,153,0.28)"/>
      <text x="232" y="27" fill="#34d399" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="700">Secrets</text>
      <rect x="388" y="0" width="182" height="42" rx="21" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.28)"/>
      <text x="412" y="27" fill="#fbbf24" font-size="16" font-family="Inter, Arial, sans-serif" font-weight="700">Release Notes</text>
    </g>
    <g transform="translate(48 376)">
      <rect x="0" y="0" width="500" height="192" rx="18" fill="rgba(8,14,23,0.85)" stroke="rgba(0,212,255,0.14)"/>
      <text x="24" y="36" fill="#64748b" font-size="17" font-family="JetBrains Mono, monospace"># why developers lose context faster than they think</text>
      <text x="24" y="74" fill="#00d4ff" font-size="19" font-family="JetBrains Mono, monospace">$</text>
      <text x="48" y="74" fill="#e6edf3" font-size="19" font-family="JetBrains Mono, monospace">echo "TypeError" | </text>
      <text x="250" y="74" fill="#00d4ff" font-size="19" font-family="JetBrains Mono, monospace" font-weight="700">cg copy</text>
      <text x="24" y="110" fill="#00d4ff" font-size="19" font-family="JetBrains Mono, monospace">$</text>
      <text x="48" y="110" fill="#e6edf3" font-size="19" font-family="JetBrains Mono, monospace">cg list</text>
      <text x="24" y="146" fill="#94a3b8" font-size="18" font-family="JetBrains Mono, monospace">error  14s  TypeError: Cannot read ...</text>
    </g>
    <g transform="translate(584 376)">
      <rect x="0" y="0" width="428" height="82" rx="18" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)"/>
      <text x="28" y="34" fill="#e6edf3" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">What we cover</text>
      <text x="28" y="58" fill="#94a3b8" font-size="15" font-family="Inter, Arial, sans-serif">Install flows, local-first design, secret handling,</text>
      <text x="28" y="78" fill="#94a3b8" font-size="15" font-family="Inter, Arial, sans-serif">and practical developer workflow notes.</text>
      <rect x="0" y="104" width="428" height="138" rx="18" fill="rgba(0,212,255,0.07)" stroke="rgba(0,212,255,0.16)"/>
      <text x="28" y="140" fill="#00d4ff" font-size="18" font-family="Inter, Arial, sans-serif" font-weight="700">Featured</text>
      <text x="28" y="178" fill="#e6edf3" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="800">Best Clipboard Manager</text>
      <text x="28" y="208" fill="#e6edf3" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="800">for Developers in 2026</text>
      <text x="28" y="230" fill="#94a3b8" font-size="16" font-family="Inter, Arial, sans-serif">Local-first, terminal-friendly, and AI-ready.</text>
    </g>
  </g>
</svg>
